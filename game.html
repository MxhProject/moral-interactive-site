<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>互动游戏 · Moral Fantastic</title>
  <style>
    /* 横屏提示遮罩 - 默认隐藏 */
#rotateOverlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.88);
  backdrop-filter: blur(8px);
  z-index: 99999;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  text-align: center;
  font-family: 'Nunito', system-ui, sans-serif;
}
#rotateOverlay.active { display: flex; }
#rotateOverlay .rotate-icon { 
  font-size: 5rem; 
  margin-bottom: 20px;
  animation: rotatePhone 1.5s ease-in-out infinite; 
}
#rotateOverlay p { 
  font-size: 1.2rem; 
  margin-bottom: 10px;
}
#rotateOverlay .rotate-sub {
  font-size: 0.85rem;
  color: #94a3b8;
}
@keyframes rotatePhone { 
  0%,100%{transform:rotate(0deg);} 
  50%{transform:rotate(90deg);} 
}
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Nunito', system-ui; background: #fff; color: #2d4e1e; }
    .sticky-header {
      position: sticky; top: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(10px);
      border-bottom: 2px solid #d4e6ca; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .logo-icon { font-size: 28px; animation: bounce 2s infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);} }
    .logo-text { font-size: 1.5rem; font-weight: 800; color: #2d4e1e; }
    .back-home { background: #eef5ea; color: #2d4e1e; text-decoration: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; }
    .back-home:hover { background: #7fa86a; color: white; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 40px; }
    h1 { color: #2d4e1e; margin-bottom: 8px; }
    .game-selector { background: white; border-radius: 32px; border: 1px solid #d4e6ca; padding: 20px; margin: 20px 0; }
    select { width: 100%; padding: 14px 16px; border: 2px solid #e2ecd9; border-radius: 60px; font-family: inherit; margin-bottom: 16px; }
    
    /* ========== 游戏容器尺寸 ========== */
    .game-container { 
      background: #1a2a1a; 
      border-radius: 24px; 
      overflow: hidden; 
      width: 100%;
      height: 550px;
      min-height: 500px;
    }
    
    /* 手机版 */
    @media (max-width: 768px) {
      .game-container {
        height: 70vh;
        min-height: 450px;
      }
    }
    
    /* 大屏幕电脑 */
    @media (min-width: 1200px) {
      .game-container {
        height: 650px;
      }
    }
    
    .game-container iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block;
    }
    
    .game-note { text-align: center; margin-top: 12px; color: #8aa67d; }
    .nav-buttons { display: flex; gap: 16px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
    .nav-btn { background: #7fa86a; color: white; text-decoration: none; padding: 12px 28px; border-radius: 60px; font-weight: 600; transition: 0.2s; }
    .nav-btn:hover { background: #5b8c4e; transform: translateY(-2px); }
    .nav-btn.outline { background: white; color: #7fa86a; border: 2px solid #7fa86a; }
    footer { text-align: center; padding: 24px; color: #9bb88b; border-top: 1px solid #e2ecd9; margin-top: 20px; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="rotateOverlay">
  <div class="rotate-icon">📱</div>
  <p>请将手机转回竖屏模式</p>
  <p class="rotate-sub">Sila putar telefon ke mod potret</p>
</div>
<div class="sticky-header">
  <div class="logo-area"><div class="logo-icon">🍀</div><div class="logo-text">Moral Fantastic</div></div>
  <a href="zh.html" class="back-home">🏠 返回首页</a>
</div>
<div class="container">
  <h1>🎮 互动德育游戏</h1>
  <p style="color: #6b7c63; margin-bottom: 16px;">选择游戏，学习如何应对网络霸凌</p>
  <div class="game-selector">
    <div style="font-weight:700; margin-bottom:12px;">🛡️ 选择游戏</div>
    <select id="gameSelect" onchange="switchGame()">
      <option value="0">网络安全卫士 I</option>
      <option value="1">网络安全卫士 II</option>
      <option value="2">网络安全卫士 III</option>
    </select>
    <div class="game-container" id="gameContainer"><iframe src="cyber-guardian.html" allowfullscreen></iframe></div>
    <div class="game-note" id="gameNote">🛡️ 网络安全卫士 · 阻止霸凌，守护网络世界！</div>
  </div>
  <div class="nav-buttons">
    <a href="video.html" class="nav-btn outline">← 上一页：教学视频</a>
    <a href="zh.html" class="nav-btn">🏠 返回首页</a>
    <a href="classroom.html" class="nav-btn outline">下一页：现实课堂 →</a>
  </div>
</div>
<footer>© 2026 Moral Fantastic · 德育如细雨，润物细无声</footer>
<script>
  // 横屏检测
function isTouchDevice() {
  return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
}
function checkOrientation() {
  var o = document.getElementById('rotateOverlay');
  if (!o) return;
  if (!isTouchDevice()) { o.classList.remove('active'); return; }
  if (window.innerWidth > window.innerHeight) {
    o.classList.add('active');
  } else {
    o.classList.remove('active');
  }
}
window.addEventListener('orientationchange', checkOrientation);
window.addEventListener('resize', checkOrientation);
checkOrientation();
  const GAMES = [
    { src: 'cyber-guardian.html', note: '🛡️ 网络安全卫士 I · 阻止霸凌，守护网络世界！' },
    { src: 'cyber-guardian2.html', note: '🛡️ 网络安全卫士 II · 第二关挑战' },
    { src: 'cyber-guardian3.html', note: '🛡️ 网络安全卫士 III · 终极挑战' }
  ];
  function switchGame() {
    const idx = parseInt(document.getElementById('gameSelect').value);
    const container = document.getElementById('gameContainer');
    container.innerHTML = `<iframe src="${GAMES[idx].src}" allowfullscreen></iframe>`;
    document.getElementById('gameNote').innerHTML = GAMES[idx].note;
  }
</script>
</body>
</html>
