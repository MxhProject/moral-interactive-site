#rotateOverlay {
  display: none;

  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.88);
  backdrop-filter: blur(8px);
  z-index: 99999;

  flex-direction: column;

}

}
#rotateOverlay .rotate-sub {
  font-size: 0.85rem;
  color: #94a3b8;
}
@keyframes rotatePhone { 
  0%,100%{transform:rotate(0deg);} 
  50%{transform:rotate(90deg);} 
}

<script>
  // 横屏检测
function isTouchDevice() {
  return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
}
function checkOrientation() {
  var o = document.getElementById('rotateOverlay');
  if (!o) return;
  if (!isTouchDevice()) { o.classList.remove('active'); return; }
  if (window.innerWidth > window.innerHeight) {
    o.classList.add('active');
  } else {
    o.classList.remove('active');
  }
}
window.addEventListener('orientationchange', checkOrientation);
window.addEventListener('resize', checkOrientation);
checkOrientation();
  function updateVideoHeight() {
    const videoWrappers = document.querySelectorAll('.video-wrapper');
    const isMobile = window.innerWidth < 768;
    const isLarge = window.innerWidth > 1200;
    
    let targetHeight;
    if (isMobile) {
      targetHeight = '70vh';
    } else if (isLarge) {
      targetHeight = '650px';
    } else {
      targetHeight = '550px';
    }
    
    videoWrappers.forEach(wrapper => {
      wrapper.style.height = targetHeight;
    });
  }
  
  window.addEventListener('resize', updateVideoHeight);
  window.addEventListener('load', updateVideoHeight);
  setTimeout(updateVideoHeight, 100);
</script>
